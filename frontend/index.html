<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV Subscriber - IEC 61850-9-2</title>

    <!-- Tabulator CSS -->
    <link href="https://unpkg.com/tabulator-tables@5.6.1/dist/css/tabulator_midnight.min.css" rel="stylesheet">

    <!-- uPlot CSS -->

    <!-- App CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Single mount point — components inject their HTML here -->

    <!-- Tabulator JS (CDN) -->

    <!-- Utilities -->
    <script src="js/utils/backend.js"></script>

    <!-- Components (order doesn't matter — they only define objects) -->
    <script src="js/components/navbar.js"></script>
    <script src="js/components/stats.js"></script>
    <script src="js/components/timing.js"></script>
    <script src="js/components/config.js"></script>
    <script src="js/components/table.js"></script>
    <script src="js/components/analysis.js"></script>
    <script src="js/components/frameview.js"></script>
    <script src="js/components/chart.js"></script>
    <script src="js/components/phasor.js"></script>

    <!-- Orchestrator (must load last — assembles page from components) -->

</html>
